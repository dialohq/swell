name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# CI does one thing: build every derivation under the flake's
# `checks.<system>` output in parallel via nix-fast-build. The Nix store
# is content-addressed, so derivations whose inputs are unchanged are
# served from cache (no rebuild). Adding a new check means adding a
# derivation in flake.nix — no workflow edits required.
jobs:
  check:
    name: nix-fast-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: nix-fast-build
        run: nix run nixpkgs#nix-fast-build -- --skip-cached --no-nom --flake .#checks
