name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# CI does one thing: build every derivation under the flake's
# `checks.<system>` output in parallel via nix-fast-build. The Nix store
# is content-addressed, so derivations whose inputs are unchanged are
# served from cache (no rebuild). Adding a new check means adding a
# derivation in flake.nix — no workflow edits required.
jobs:
  check:
    name: nix-fast-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          # `relaxed` lets specific derivations opt out of the sandbox via
          # `__noChroot = true` — needed for the tsc-driven checks which
          # `bun install` from the public npm registry inside the build.
          # Other derivations still run sandboxed; only the ones that opt
          # out get network access.
          extra-conf: |
            sandbox = relaxed
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: nix-fast-build
        run: nix run nixpkgs#nix-fast-build -- --skip-cached --no-nom --flake .#checks
